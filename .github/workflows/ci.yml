name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # Validation
  # ──────────────────────────────────────────────

  validate:
    name: Validate manifest & templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate manifest JSON
        run: |
          python3 -c "
          import json
          m = json.load(open('manifest/latest.json'))
          assert m['rocq_version'], 'missing rocq_version'
          assert m['platform_release'], 'missing platform_release'
          a = m['assets']
          assert 'windows' in a and 'x86_64' in a['windows'], 'missing windows asset'
          assert 'macos' in a and 'arm64' in a['macos'], 'missing macos asset'
          assert 'linux' in a and 'x86_64' in a['linux'], 'missing linux asset'
          assert a['linux']['x86_64']['type'] == 'opam', 'linux asset should be opam type'
          print('Manifest OK: Rocq', m['rocq_version'], '- Platform', m['platform_release'])
          "

      - name: Validate templates
        run: |
          test -f templates/test.v
          test -f templates/main.v
          test -f templates/_RocqProject
          echo "All templates OK"

  # ──────────────────────────────────────────────
  # Shell installer (Linux headless)
  # ──────────────────────────────────────────────

  shell-installer:
    name: Shell installer (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps (opam, jq)
        run: |
          sudo apt-get update
          sudo apt-get install -y opam jq
          opam init -y --bare

      - name: Install (headless) + Doctor
        run: |
          chmod +x install.sh
          ./install.sh --skip-vscode --workspace /tmp/rocq-ws --recreate-switch
          ./install.sh --doctor --skip-vscode --workspace /tmp/rocq-ws

  # ──────────────────────────────────────────────
  # Linux GUI
  # ──────────────────────────────────────────────

  linux:
    name: Linux (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install Fyne system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl-dev libxxf86vm-dev libxi-dev \
            libxcursor-dev libxrandr-dev libxinerama-dev

      - name: Go vet
        working-directory: linux
        run: go vet ./...

      - name: Build
        working-directory: linux
        run: make all

      - name: Verify ELF binary
        working-directory: linux
        run: |
          file rocq-platform-starter | grep -q "ELF 64-bit LSB"
          SIZE=$(stat -c%s rocq-platform-starter)
          echo "Binary size: $SIZE bytes"
          if [ "$SIZE" -lt 1000000 ]; then
            echo "Binary seems too small"
            exit 1
          fi

      - name: Test --help
        working-directory: linux
        run: |
          OUTPUT=$(./rocq-platform-starter --help)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "\-\-install"
          echo "$OUTPUT" | grep -q "\-\-uninstall"

      - name: Test --install / --uninstall
        working-directory: linux
        run: |
          ./rocq-platform-starter --install
          test -f "$HOME/.local/bin/rocq-platform-starter"
          test -f "$HOME/.local/share/icons/hicolor/256x256/apps/rocq-platform-starter.png"
          test -f "$HOME/.local/share/applications/rocq-platform-starter.desktop"
          "$HOME/.local/bin/rocq-platform-starter" --help | grep -q "Launch the GUI"
          echo "Install OK"

          ./rocq-platform-starter --uninstall
          test ! -f "$HOME/.local/bin/rocq-platform-starter"
          test ! -f "$HOME/.local/share/icons/hicolor/256x256/apps/rocq-platform-starter.png"
          test ! -f "$HOME/.local/share/applications/rocq-platform-starter.desktop"
          echo "Uninstall OK"

      - name: Test embedded assets
        working-directory: linux
        run: |
          python3 -c "import json; json.load(open('embedded/manifest/latest.json'))"
          test -f embedded/templates/test.v
          test -f embedded/templates/main.v
          test -f embedded/templates/_RocqProject

      - name: Smoke test — launch headless
        working-directory: linux
        timeout-minutes: 1
        continue-on-error: true
        run: |
          ./rocq-platform-starter &
          PID=$!
          sleep 3
          if kill -0 $PID 2>/dev/null; then
            echo "Process running (PID: $PID), stopping."
            kill $PID || true
            echo "Smoke test passed."
          else
            wait $PID 2>/dev/null || true
            echo "Process exited (expected in headless CI)."
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rocq-platform-starter-linux
          path: linux/rocq-platform-starter

  # ──────────────────────────────────────────────
  # Windows GUI
  # ──────────────────────────────────────────────

  windows-cross:
    name: Windows (cross-compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install mingw-w64
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Go vet
        working-directory: windows
        run: CGO_ENABLED=1 CC=x86_64-w64-mingw32-gcc GOOS=windows GOARCH=amd64 go vet ./...

      - name: Build
        working-directory: windows
        run: make all

      - name: Verify PE32+ executable
        working-directory: windows
        run: |
          file rocq-platform-starter.exe | grep -q "PE32+ executable (GUI) x86-64"
          SIZE=$(stat -c%s rocq-platform-starter.exe)
          echo "Exe size: $SIZE bytes"
          if [ "$SIZE" -lt 1000000 ]; then
            echo "Exe seems too small"
            exit 1
          fi

      - name: Test embedded assets
        working-directory: windows
        run: |
          python3 -c "import json; json.load(open('embedded/manifest/latest.json'))"
          test -f embedded/templates/test.v
          test -f embedded/templates/main.v
          test -f embedded/templates/_RocqProject

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rocq-platform-starter-windows
          path: windows/rocq-platform-starter.exe

  windows-native:
    name: Windows (native build + smoke test)
    needs: windows-cross
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Sync assets
        shell: bash
        working-directory: windows
        run: |
          cp -f ../manifest/latest.json embedded/manifest/latest.json
          cp -f ../templates/test.v embedded/templates/test.v
          cp -f ../templates/main.v embedded/templates/main.v
          cp -f ../templates/_RocqProject embedded/templates/_RocqProject

      - name: Build natively
        shell: bash
        working-directory: windows
        run: go build -ldflags="-H windowsgui -s -w" -o rocq-platform-starter.exe ./cmd/rocq-platform-starter/

      - name: Verify output
        shell: pwsh
        run: |
          if (!(Test-Path "windows\rocq-platform-starter.exe")) { throw "Build failed" }
          $size = (Get-Item "windows\rocq-platform-starter.exe").Length
          Write-Host "Native build succeeded: $size bytes"
          if ($size -lt 1MB) { throw "exe too small ($size bytes)" }

      - name: Download cross-compiled artifact
        uses: actions/download-artifact@v4
        with:
          name: rocq-platform-starter-windows
          path: cross/

      - name: Smoke test — cross-compiled exe
        shell: pwsh
        timeout-minutes: 1
        continue-on-error: true
        run: |
          $proc = Start-Process -FilePath "cross\rocq-platform-starter.exe" -PassThru -NoNewWindow
          Start-Sleep -Seconds 5
          if (!$proc.HasExited) {
            Write-Host "Process running (PID: $($proc.Id)), stopping."
            Stop-Process -Id $proc.Id -Force
            Write-Host "Smoke test passed."
          } else {
            Write-Host "Process exited with code: $($proc.ExitCode) (expected in headless CI)."
          }

  # ──────────────────────────────────────────────
  # macOS GUI
  # ──────────────────────────────────────────────

  macos:
    name: macOS (build + test)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Go vet
        working-directory: macos
        run: go vet ./...

      - name: Build and package DMG
        working-directory: macos
        run: make all

      - name: Verify Mach-O binary
        working-directory: macos
        run: file rocq-platform-starter | grep -q "Mach-O"

      - name: Verify app bundle
        working-directory: macos
        run: |
          test -d "Rocq-Platform-Starter.app/Contents/MacOS"
          test -f "Rocq-Platform-Starter.app/Contents/MacOS/rocq-platform-starter"
          test -f "Rocq-Platform-Starter.app/Contents/Info.plist"

      - name: Verify DMG
        working-directory: macos
        run: |
          test -f rocq-platform-starter.dmg
          SIZE=$(stat -f%z rocq-platform-starter.dmg)
          echo "DMG size: $SIZE bytes"
          if [ "$SIZE" -lt 1000000 ]; then
            echo "DMG seems too small"
            exit 1
          fi

      - name: Test embedded assets
        working-directory: macos
        run: |
          python3 -c "import json; json.load(open('embedded/manifest/latest.json'))"
          test -f embedded/templates/test.v
          test -f embedded/templates/main.v
          test -f embedded/templates/_RocqProject

      - name: Smoke test — mount DMG and verify contents
        working-directory: macos
        run: |
          MOUNT_POINT=$(hdiutil attach rocq-platform-starter.dmg -nobrowse | awk '/Volumes\// {for(i=3;i<=NF;i++) printf "%s ", $i; print ""}' | sed 's/ *$//')
          echo "Mounted at: $MOUNT_POINT"
          test -d "$MOUNT_POINT/Rocq-Platform-Starter.app"
          test -f "$MOUNT_POINT/Rocq-Platform-Starter.app/Contents/MacOS/rocq-platform-starter"
          echo "DMG contents OK"
          hdiutil detach "$MOUNT_POINT" || true

      - name: Smoke test — launch headless
        working-directory: macos
        timeout-minutes: 1
        continue-on-error: true
        run: |
          ./rocq-platform-starter &
          PID=$!
          sleep 3
          if kill -0 $PID 2>/dev/null; then
            echo "Process running (PID: $PID), stopping."
            kill $PID || true
            echo "Smoke test passed."
          else
            wait $PID 2>/dev/null || true
            echo "Process exited (expected in headless CI)."
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rocq-platform-starter-macos
          path: macos/rocq-platform-starter.dmg
