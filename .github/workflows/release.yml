name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────
  # Linux
  # ──────────────────────────────────────────────

  linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install Fyne system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl-dev libxxf86vm-dev libxi-dev \
            libxcursor-dev libxrandr-dev libxinerama-dev

      - name: Go vet
        working-directory: linux
        run: go vet ./...

      - name: Build
        working-directory: linux
        run: make all VERSION=${{ inputs.tag }}

      - name: Verify ELF binary
        working-directory: linux
        run: file rocq-platform-starter | grep -q "ELF 64-bit LSB"

      - name: Test --help
        working-directory: linux
        run: ./rocq-platform-starter --help | grep -q "\-\-install"

      - name: Test --install / --uninstall
        working-directory: linux
        run: |
          ./rocq-platform-starter --install
          test -f "$HOME/.local/bin/rocq-platform-starter"
          test -f "$HOME/.local/share/applications/rocq-platform-starter.desktop"
          ./rocq-platform-starter --uninstall
          test ! -f "$HOME/.local/bin/rocq-platform-starter"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rocq-platform-starter-linux
          path: linux/rocq-platform-starter

  # ──────────────────────────────────────────────
  # Windows
  # ──────────────────────────────────────────────

  windows:
    name: Build Windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install mingw-w64
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Go vet
        working-directory: windows
        run: CGO_ENABLED=1 CC=x86_64-w64-mingw32-gcc GOOS=windows GOARCH=amd64 go vet ./...

      - name: Build
        working-directory: windows
        run: make all VERSION=${{ inputs.tag }}

      - name: Verify PE32+ executable
        working-directory: windows
        run: file rocq-platform-starter.exe | grep -q "PE32+ executable (GUI) x86-64"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rocq-platform-starter-windows
          path: windows/rocq-platform-starter.exe

  # ──────────────────────────────────────────────
  # macOS
  # ──────────────────────────────────────────────

  macos:
    name: Build macOS
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Go vet
        working-directory: macos
        run: go vet ./...

      - name: Build and package DMG
        working-directory: macos
        run: make all VERSION=${{ inputs.tag }}

      - name: Verify DMG
        working-directory: macos
        run: |
          test -f rocq-platform-starter.dmg
          SIZE=$(stat -f%z rocq-platform-starter.dmg)
          echo "DMG size: $SIZE bytes"
          if [ "$SIZE" -lt 1000000 ]; then
            echo "DMG seems too small ($SIZE bytes)"
            exit 1
          fi

      - name: Verify app bundle inside DMG
        working-directory: macos
        run: |
          MOUNT_POINT=$(hdiutil attach rocq-platform-starter.dmg -nobrowse | awk '/Volumes\// {for(i=3;i<=NF;i++) printf "%s ", $i; print ""}' | sed 's/ *$//')
          test -d "$MOUNT_POINT/Rocq-Platform-Starter.app"
          test -f "$MOUNT_POINT/Rocq-Platform-Starter.app/Contents/MacOS/rocq-platform-starter"
          hdiutil detach "$MOUNT_POINT" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rocq-platform-starter-macos
          path: macos/rocq-platform-starter.dmg

  # ──────────────────────────────────────────────
  # Release
  # ──────────────────────────────────────────────

  release:
    name: Create release
    needs: [linux, windows, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Verify all artifacts
        run: |
          test -f artifacts/rocq-platform-starter-windows/rocq-platform-starter.exe
          echo "Windows: $(stat -c%s artifacts/rocq-platform-starter-windows/rocq-platform-starter.exe) bytes"
          test -f artifacts/rocq-platform-starter-macos/rocq-platform-starter.dmg
          echo "macOS:   $(stat -c%s artifacts/rocq-platform-starter-macos/rocq-platform-starter.dmg) bytes"
          test -f artifacts/rocq-platform-starter-linux/rocq-platform-starter
          echo "Linux:   $(stat -c%s artifacts/rocq-platform-starter-linux/rocq-platform-starter) bytes"

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          sha256sum rocq-platform-starter-windows/rocq-platform-starter.exe \
                    rocq-platform-starter-macos/rocq-platform-starter.dmg \
                    rocq-platform-starter-linux/rocq-platform-starter | tee SHA256SUMS.txt

      - name: Extract manifest info
        id: manifest
        run: |
          echo "rocq_version=$(python3 -c "import json; print(json.load(open('manifest/latest.json'))['rocq_version'])")" >> "$GITHUB_OUTPUT"
          echo "platform_release=$(python3 -c "import json; print(json.load(open('manifest/latest.json'))['platform_release'])")" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: |
          ROCQ_VERSION="${{ steps.manifest.outputs.rocq_version }}"
          PLATFORM_RELEASE="${{ steps.manifest.outputs.platform_release }}"

          # Find previous tag
          PREV_TAG=$(git tag --sort=-v:refname | head -n 1 || echo "")

          # Generate changelog
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges "${PREV_TAG}..HEAD")
          fi

          # Checksums
          WIN_SHA=$(sha256sum artifacts/rocq-platform-starter-windows/rocq-platform-starter.exe | awk '{print $1}')
          MAC_SHA=$(sha256sum artifacts/rocq-platform-starter-macos/rocq-platform-starter.dmg | awk '{print $1}')
          LIN_SHA=$(sha256sum artifacts/rocq-platform-starter-linux/rocq-platform-starter | awk '{print $1}')

          cat > /tmp/release-body.md << 'ENDOFHEADER'
          Cross-platform GUI installer for Rocq Platform.
          ENDOFHEADER

          # Build the full body (can't use heredoc with variable expansion and EOF in same block)
          cat > /tmp/release-body.md << ENDOFBODY
          Cross-platform GUI installer for Rocq Platform **${PLATFORM_RELEASE}** (Rocq **${ROCQ_VERSION}**).

          ## Installation

          ### Windows
          Download \`rocq-platform-starter-windows-x86_64.exe\` and run it.

          ### macOS (Apple Silicon)
          Download \`rocq-platform-starter-macos-arm64.dmg\`, open the DMG and drag the app to Applications.

          ### Linux (x86_64)
          \`\`\`bash
          chmod +x rocq-platform-starter-linux-x86_64
          ./rocq-platform-starter-linux-x86_64              # run directly
          ./rocq-platform-starter-linux-x86_64 --install    # install as desktop app
          \`\`\`

          ## What's changed

          ${CHANGELOG}

          $([ -n "$PREV_TAG" ] && echo "**Full changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ inputs.tag }}")

          ## SHA256 checksums

          \`\`\`
          ${WIN_SHA}  rocq-platform-starter-windows-x86_64.exe
          ${MAC_SHA}  rocq-platform-starter-macos-arm64.dmg
          ${LIN_SHA}  rocq-platform-starter-linux-x86_64
          \`\`\`
          ENDOFBODY

          sed -i 's/^          //' /tmp/release-body.md

      - name: Create tag
        run: |
          git tag ${{ inputs.tag }}
          git push origin ${{ inputs.tag }}

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ inputs.tag }} \
            --title "Rocq-Platform-Starter ${{ inputs.tag }}" \
            --draft \
            --notes-file /tmp/release-body.md \
            artifacts/rocq-platform-starter-windows/rocq-platform-starter.exe#rocq-platform-starter-windows-x86_64.exe \
            artifacts/rocq-platform-starter-macos/rocq-platform-starter.dmg#rocq-platform-starter-macos-arm64.dmg \
            artifacts/rocq-platform-starter-linux/rocq-platform-starter#rocq-platform-starter-linux-x86_64 \
            artifacts/SHA256SUMS.txt#SHA256SUMS.txt
